name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master]
  workflow_call:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo:8
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: admin
          MONGO_INITDB_ROOT_PASSWORD: secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit --workspace=server

      - name: Integration tests
        run: npm run test:int --workspace=server

      - name: Build
        run: npm run build

      - name: Build Docker images
        run: |
          docker build -f Dockerfile.server -t linkvault-server .
          docker build -f Dockerfile.client -t linkvault-client .